<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G77G9N | Professional IT & Cybersecurity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #3b82f6; 
            --accent: #06b6d4;
            --dark-bg: #020617; 
        }

        /* Smooth Scrolling */
        html { scroll-behavior: smooth; }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: var(--dark-bg); 
            color: #e2e8f0; 
        }
        
        /* Hero Section with High-Tech Background */
        .hero { 
            background: linear-gradient(rgba(2, 6, 23, 0.75), rgba(2, 6, 23, 0.75)), 
                        url('https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=1920'); 
            background-size: cover; 
            background-position: center; 
            padding: 140px 0;
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 20px;
            overflow: hidden; 
            transition: 0.4s ease;
        }
        .glass-card:hover { 
            border-color: var(--primary); 
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.2);
        }
        
        .service-img { width: 100%; height: 220px; object-fit: cover; }

        /* Tech Button Style */
        .btn-cyber { 
            background: linear-gradient(45deg, var(--primary), var(--accent)); 
            border: none; 
            color: white; 
            padding: 12px 35px; 
            border-radius: 10px; 
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-cyber:hover { opacity: 0.9; transform: scale(1.05); color: white; }

        /* Professional Footer Styling */
        .custom-footer {
            background-color: #0f172a; /* Deep Navy */
            color: #94a3b8;
            padding: 60px 0 30px 0;
            border-top: 2px solid var(--primary);
        }
        .footer-logo { color: white; font-weight: 700; font-size: 1.5rem; }
        .footer-tagline { color: var(--primary); font-weight: 500; }
    </style>
</head>
